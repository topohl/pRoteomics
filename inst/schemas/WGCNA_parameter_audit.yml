  n_samples: {type: integer}
  n_animals: {type: integer}
  n_features_input: {type: integer}
  n_features_after_filter: {type: integer}
  missingness_filter: {type: character}
  imputation_source: {type: character}
  normalization_source: {type: character}
  correlation_method: {type: character}
  network_type: {type: character}
  TOM_type: {type: character}
  soft_power: {type: numeric}
  scale_free_R2: {type: numeric}
  mean_connectivity: {type: numeric}
  min_module_size: {type: integer}
  merge_cut_height: {type: numeric}
  deepSplit: {type: integer}
