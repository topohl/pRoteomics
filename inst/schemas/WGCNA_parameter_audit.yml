  - n_samples
  - n_animals
  - n_features_input
  - n_features_after_filter
  - missingness_filter
  - imputation_source
  - normalization_source
  - correlation_method
  - network_type
  - TOM_type
  - soft_power
  - scale_free_R2
  - mean_connectivity
  - min_module_size
  - merge_cut_height
  - deepSplit
  - pamRespectsDendro
  - random_seed
  - supermodule_cut_height
