name: microglia_neuropil_independence_claim_gate
required_columns:
  - module_or_supermodule_id
  - endpoint_type
  - endpoint_scope
  - source_level
  - direct_independence_tested
  - direct_supermodule_test
  - contrast
  - biological_program
  - microenvironment_class
  - adjustment_mode
  - covariate_family
  - primary_effect_status
  - primary_effect_claim_relevant
  - primary_effect_threshold
  - independence_classification
  - claim_gate_eligible
  - downgrade_reason
  - n_matched_animals
  - min_animals_per_group
  - effect_before
  - effect_after
  - effect_before_abs
  - effect_before_near_zero
  - percent_attenuation
  - percent_attenuation_reliable
  - direction_preserved
  - audit_group_n
  - eligible_without_primary_effect_count
columns:
  module_or_supermodule_id: {type: character}
  endpoint_type: {type: character}
  endpoint_scope: {type: character, allowed_values: [module, targeted_signature, supermodule, unavailable]}
  source_level: {type: character, allowed_values: [module, targeted_signature, supermodule]}
  direct_independence_tested: {type: logical}
  direct_supermodule_test: {type: logical}
  contrast: {type: character}
  biological_program: {type: character}
  microenvironment_class: {type: character}
  adjustment_mode: {type: character, allowed_values: [predeclared_primary, predeclared_secondary, exploratory_best_spearman]}
  covariate_family: {type: character}
  primary_effect_status: {type: character, allowed_values: [FDR_pass, nominal_only, no_primary_effect, missing_effect_statistic, not_applicable]}
  primary_effect_claim_relevant: {type: logical}
  primary_effect_threshold: {type: character}
  independence_classification: {type: character, allowed_values: [neuropil_independent, partially_neuropil_adjusted, neuropil_sensitive, inconclusive_low_power, inconclusive_missing_match, diagnostic_no_primary_effect, inconclusive_no_primary_effect, exploratory_only, mixed_or_covariate_sensitive]}
  claim_gate_eligible: {type: logical}
  downgrade_reason: {type: character}
  n_matched_animals: {type: integer}
  min_animals_per_group: {type: integer}
  effect_before: {type: numeric}
  effect_after: {type: numeric}
  effect_before_abs: {type: numeric}
  effect_before_near_zero: {type: logical}
  percent_attenuation: {type: numeric}
  percent_attenuation_reliable: {type: logical}
  direction_preserved: {type: logical}
  audit_group_n: {type: integer}
  eligible_without_primary_effect_count: {type: integer}
