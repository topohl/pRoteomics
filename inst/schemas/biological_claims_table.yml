name: biological_claims_table
required_columns:
  - claim_id
  - dataset
  - biological_program
  - evidence_type
  - claim_type
  - claim_use_class
  - raw_top_GO_term
  - representative_GO_terms
  - semantic_parent_label
  - safe_program_label
  - term_label_risk
  - label_confidence
  - label_basis
  - label_downgrade_reason
  - claim_grade
  - primary_evidence
  - orthogonal_support
  - major_limitation
  - safe_interpretation
  - unsafe_overinterpretation
  - claim_allowed
  - claim_gate_status
  - claim_downgrade_reason
  - model_fit_status
  - statistical_evidence_status
  - claim_gate_model_status
  - primary_model_status
  - animal_level_gate
  - qc_gate
  - missingness_gate
  - batch_confound_gate
  - marker_contamination_gate
  - microglia_roi_gate
  - neuropil_independence_gate
  - robustness_gate
  - evidence_independence_gate
columns:
  claim_id: {type: character}
  dataset: {type: character, allowed_values: [neuron_neuropil, neuron_soma, microglia]}
  region: {type: character}
  layer_cell_compartment: {type: character}
  contrast: {type: character}
  biological_program: {type: character}
  direction: {type: character}
  key_proteins_genes: {type: character}
  evidence_type: {type: character}
  claim_type: {type: character, allowed_values: [wgcna_group_effect, enrichment_program, module_annotation, microglia_signature, microglia_roi_context, behavior_association, integration_summary, export_context]}
  claim_use_class: {type: character, allowed_values: [primary_claim, supporting_claim, suggestive_context, annotation_only, blocked]}
  raw_top_GO_term: {type: character}
  representative_GO_terms: {type: character}
  semantic_parent_label: {type: character}
  safe_program_label: {type: character}
  term_label_risk: {type: character, allowed_values: [none, tissue_mismatched_top_term, broad_developmental_GO, low_specificity_GO, non_neural_surface_label, single_term_driven, mixed_unresolved, not_applicable]}
  label_confidence: {type: character, allowed_values: [high, moderate, low, not_applicable]}
  label_basis: {type: character}
  label_downgrade_reason: {type: character}
  effect_size_NES: {type: numeric}
  raw_p: {type: numeric, range: {min: 0, max: 1}}
  FDR: {type: numeric, range: {min: 0, max: 1}}
  robustness_stability_metric: {type: character}
  source_file: {type: character}
  figure_table_target: {type: character}
  interpretation_note: {type: character}
  claim_grade: {type: character, allowed_values: [A, B, C, D, X]}
  primary_evidence: {type: character}
  orthogonal_support: {type: character}
  major_limitation: {type: character}
  safe_interpretation: {type: character}
  unsafe_overinterpretation: {type: character}
  claim_allowed: {type: logical}
  claim_gate_status: {type: character, allowed_values: [allowed, downgraded, disallowed]}
  claim_downgrade_reason: {type: character}
  model_fit_status: {type: character, allowed_values: [pass, singular, rank_deficient, fallback, failed, not_applicable]}
  statistical_evidence_status: {type: character, allowed_values: [pass, nominal_only, FDR_fail, missing_p_or_FDR, not_applicable]}
  claim_gate_model_status: {type: character, allowed_values: [pass, fail, diagnostic_only, missing_required, not_applicable]}
  primary_model_status: {type: character, allowed_values: [pass, fail, missing_required, missing_optional, not_applicable, diagnostic_only]}
  animal_level_gate: {type: character, allowed_values: [pass, fail, missing_required, missing_optional, not_applicable, diagnostic_only]}
  qc_gate: {type: character, allowed_values: [pass, fail, missing_required, missing_optional, not_applicable, diagnostic_only]}
  missingness_gate: {type: character, allowed_values: [pass, fail, missing_required, missing_optional, not_applicable, diagnostic_only]}
  batch_confound_gate: {type: character, allowed_values: [pass, fail, missing_required, missing_optional, not_applicable, diagnostic_only]}
  marker_contamination_gate: {type: character, allowed_values: [pass, fail, missing_required, missing_optional, not_applicable, diagnostic_only]}
  microglia_roi_gate: {type: character, allowed_values: [pass, fail, missing_required, missing_optional, not_applicable, diagnostic_only]}
  neuropil_independence_gate: {type: character, allowed_values: [pass, fail, missing_required, missing_optional, not_applicable, diagnostic_only]}
  robustness_gate: {type: character, allowed_values: [pass, fail, missing_required, missing_optional, not_applicable, diagnostic_only]}
  evidence_independence_gate: {type: character, allowed_values: [pass, fail, missing_required, missing_optional, not_applicable, diagnostic_only]}
  missingness_confounded: {type: character}
  plate_or_batch_confounded: {type: character}
  region_layer_imbalance_risk: {type: character}
  animal_pseudoreplication_risk: {type: character}
  early_pc_association: {type: character}
  marker_contamination_risk: {type: character}
  qc_interpretation_flag: {type: character}
  animal_level_status: {type: character}
