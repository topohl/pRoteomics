version: 2
description: "Canonical active proteomics pipeline registry. This file is the source of truth for runnable stages, script order, dataset support, inputs, outputs, and safe-rerun status."
datasets:
  - neuron_neuropil
  - neuron_soma
  - microglia
stages:
  core:
    description: "Core dataset handoff: split upstream contrast files, prepare module-score metadata, and map protein identifiers for downstream analyses."
    scripts:
      - script: "01_preprocessing/03_gct_extractR.r"
        required: true
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "core"
        scope: "dataset_specific"
        produces: ["data/processed/01_preprocessing/gct_extractR/<dataset>/forward/*.csv", "data/processed/01_preprocessing/gct_extractR/<dataset>/reverse/*.csv", "data/processed/01_preprocessing/gct_extractR/<dataset>/indexComparisons.csv"]
        consumes_required: ["data/processed/01_preprocessing/protigy_output/<dataset>/*.gct"]
        consumes_optional: ["data/processed/01_preprocessing/protigy_output/<dataset>/protigy_manifest.csv", "data/processed/01_preprocessing/protigy_output/protigy_manifest.csv"]
        recomputes_core_state: true
        safe_downstream_rerun: false
        notes: "Creates dataset-scoped GCT comparison CSVs consumed by MapThatProt; rerun intentionally because this refreshes core handoff state."
      - script: "01_preprocessing/06_merged_metadata_module_score.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "core"
        scope: "dataset_specific"
        produces: ["data/processed/01_preprocessing/06_merged_metadata_module_score/<dataset>/sample_metadata_merged_clean_for_module_scores.xlsx", "results/tables/01_preprocessing/06_merged_metadata_module_score/<dataset>/metadata_merge_qc_summary.csv", "results/logs/01_preprocessing/06_merged_metadata_module_score/<dataset>/run_manifest.yml", "results/reports/01_preprocessing/06_merged_metadata_module_score/<dataset>/metadata_merge_summary.md"]
        consumes_required: ["data/processed/01_preprocessing/**/*.xlsx"]
        consumes_optional: ["data/external/behavior/auc_individual_animals_all.csv", "data/external/behavior/auc_individual_animals_firstChangeActive.csv", "data/external/behavior/E9_Behavior_Data.xlsx"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Builds dataset-scoped behavior/physiology metadata used by module activity scoring; does not change expression matrices."
      - script: "02_id_mapping/01_MapThatProt_batch.r"
        required: true
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "core"
        scope: "dataset_specific"
        produces: ["data/processed/02_id_mapping/mapped/<dataset>/forward/per_file/*.csv", "results/tables/02_id_mapping/MapThatProt_batch/<dataset>/mapped/forward/summaries/*.csv"]
        consumes_required: ["data/processed/01_preprocessing/gct_extractR/<dataset>/forward/*.csv", "data/external/MOUSE_10090_idmapping.dat"]
        consumes_optional: ["data/metadata/manual_mapping.xlsx"]
        recomputes_core_state: true
        safe_downstream_rerun: false
        notes: "Maps GCT-derived protein IDs to UniProt/gene symbols; enrichment and WGCNA consume these mapped files."
  qc_global:
    description: "Global marker/reference setup: import reference marker panels and discover empirical ROI marker sets across dataset families."
    scripts:
      - script: "03_qc_exploration/04b_import_reference_marker_sources.r"
        required: false
        datasets: ["global"]
        stage: "qc_global"
        scope: "global"
        produces: ["config/marker_panels/wgcna_reference_marker_sets.csv", "results/tables/03_qc_exploration/reference_marker_import/"]
        consumes_required: ["data/external/reference_markers/reference_marker_sources.yml"]
        consumes_optional: ["config/marker_panels/compartment_fidelity_marker_sets.csv", "data/external/reference_markers/go_mgi/raw/mgi.gaf.gz", "data/external/reference_markers/go_mgi/raw/go-basic.obo", "data/external/reference_markers/go_mgi/raw/HOM_MouseHumanSequence.rpt", "data/external/reference_markers/syngo/raw/"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Creates the marker registry consumed by marker QC and WGCNA downstream annotation; offline/cached sources are preferred."
      - script: "03_qc_exploration/05_empirical_roi_marker_discovery.r"
        required: false
        datasets: ["global"]
        stage: "qc_global"
        scope: "global"
        produces: ["results/tables/03_qc_exploration/05_empirical_roi_marker_discovery/empirical_roi_marker_sets.csv"]
        consumes_required: ["data/processed/02_id_mapping/mapped/neuron_neuropil/forward/per_file/*.csv", "data/processed/02_id_mapping/mapped/neuron_soma/forward/per_file/*.csv", "data/processed/02_id_mapping/mapped/microglia/forward/per_file/*.csv"]
        consumes_optional: ["config/marker_panels/wgcna_reference_marker_sets.csv"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Global because marker discovery compares all three dataset matrices; CON/RES/SUS contrasts should not define marker sets."
  qc:
    description: "Dataset QC: sample quality, missingness, replicate consistency, marker abundance, PCA/confounding, variance partitioning, and QC-to-biology summaries."
    scripts:
      - script: "03_qc_exploration/00_dataset_qc_report.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "qc"
        scope: "dataset_specific"
        produces: ["results/tables/03_qc_exploration/00_dataset_qc_report/<dataset>/dataset_qc_report.xlsx", "results/reports/03_qc_exploration/00_dataset_qc_report/<dataset>/dataset_qc_summary.md"]
        consumes_required: ["data/processed/02_id_mapping/mapped/<dataset>/forward/per_file/*.csv"]
        consumes_optional: ["data/metadata/*.xlsx"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Baseline dataset QC."
      - script: "03_qc_exploration/01_sample_qc_quicksearch.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "qc"
        scope: "dataset_specific"
        produces: ["results/figures/03_qc_exploration/01_sample_qc_quicksearch/<dataset>/", "results/tables/03_qc_exploration/01_sample_qc_quicksearch/<dataset>/qc_summary_tables.xlsx"]
        consumes_required: ["data/raw/pg_matrix/quicksearch.stats.annotated.xlsx"]
        consumes_optional: ["data/metadata/*.xlsx"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Quicksearch sample-level QC."
      - script: "03_qc_exploration/02_missingness_diagnostics.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "qc"
        scope: "dataset_specific"
        produces: ["results/tables/03_qc_exploration/02_missingness_diagnostics/<dataset>/missingness_diagnostics.xlsx"]
        consumes_required: ["data/processed/02_id_mapping/mapped/<dataset>/forward/per_file/*.csv"]
        consumes_optional: ["data/metadata/*.xlsx"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Missingness diagnostics."
      - script: "03_qc_exploration/03_replicate_consistency.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "qc"
        scope: "dataset_specific"
        produces: ["results/tables/03_qc_exploration/03_replicate_consistency/<dataset>/replicate_consistency.xlsx"]
        consumes_required: ["data/processed/02_id_mapping/mapped/<dataset>/forward/per_file/*.csv"]
        consumes_optional: ["data/metadata/*.xlsx"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Replicate consistency diagnostics."
      - script: "03_qc_exploration/04_marker_rank_abundance_qc.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "qc"
        scope: "dataset_specific"
        produces: ["results/tables/03_qc_exploration/04_marker_rank_abundance_qc/<dataset>/"]
        consumes_required: ["data/processed/02_id_mapping/mapped/<dataset>/forward/per_file/*.csv"]
        consumes_optional: ["config/marker_panels/wgcna_reference_marker_sets.csv", "results/tables/03_qc_exploration/05_empirical_roi_marker_discovery/empirical_roi_marker_sets.csv"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Marker abundance QC; benefits from qc_global marker registries."
      - script: "03_qc_exploration/04c_marker_detectability_and_wgcna_bridge.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "qc"
        scope: "dataset_specific"
        produces: ["results/tables/03_qc_exploration/04c_marker_detectability_and_wgcna_bridge/<dataset>/"]
        consumes_required: ["data/processed/02_id_mapping/mapped/<dataset>/forward/per_file/*.csv"]
        consumes_optional: ["config/marker_panels/wgcna_reference_marker_sets.csv", "results/tables/03_qc_exploration/05_empirical_roi_marker_discovery/empirical_roi_marker_sets.csv", "results/tables/06_modules_WGCNA/01_WGCNA/<dataset>/modules/"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "QC bridge into WGCNA marker interpretation; optional WGCNA state is used when present, so stage placement is QC although it can benefit from prior modules_wgcna outputs."
      - script: "03_qc_exploration/04d_compartment_marker_fidelity.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "qc"
        scope: "dataset_specific"
        produces: ["results/tables/03_qc_exploration/04d_compartment_marker_fidelity/<dataset>/"]
        consumes_required: ["data/processed/02_id_mapping/mapped/<dataset>/forward/per_file/*.csv"]
        consumes_optional: ["config/marker_panels/compartment_fidelity_marker_sets.csv", "config/marker_panels/wgcna_reference_marker_sets.csv"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Compartment marker fidelity QC."
      - script: "03_qc_exploration/05_pca_confounding_qc.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "qc"
        scope: "dataset_specific"
        produces: ["results/tables/03_qc_exploration/05_pca_confounding_qc/<dataset>/"]
        consumes_required: ["data/processed/02_id_mapping/mapped/<dataset>/forward/per_file/*.csv"]
        consumes_optional: ["data/metadata/*.xlsx"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "PCA and confounding QC."
      - script: "03_qc_exploration/06_variance_partitioning.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "qc"
        scope: "dataset_specific"
        produces: ["results/tables/03_qc_exploration/06_variance_partitioning/<dataset>/", "results/reports/03_qc_exploration/06_variance_partitioning/<dataset>/"]
        consumes_required: ["data/processed/02_id_mapping/mapped/<dataset>/forward/per_file/*.csv"]
        consumes_optional: ["data/metadata/*.xlsx"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Variance partitioning; no WGCNA recomputation."
      - script: "03_qc_exploration/06_wgcna_marker_trait_export.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "qc"
        scope: "dataset_specific"
        produces: ["results/tables/03_qc_exploration/06_wgcna_marker_trait_export/<dataset>/"]
        consumes_required: ["results/tables/06_modules_WGCNA/01_WGCNA/<dataset>/modules/"]
        consumes_optional: ["config/marker_panels/wgcna_reference_marker_sets.csv"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Exports QC marker traits from existing WGCNA state; confusing placement is retained for compatibility, but this script requires prior WGCNA outputs when run."
      - script: "03_qc_exploration/07_qc_biology_confounding_report.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "qc"
        scope: "dataset_specific"
        produces: ["results/reports/03_qc_exploration/07_qc_biology_confounding_report/<dataset>/"]
        consumes_required: ["results/tables/03_qc_exploration/05_pca_confounding_qc/<dataset>/", "results/tables/03_qc_exploration/06_variance_partitioning/<dataset>/"]
        consumes_optional: ["results/tables/03_qc_exploration/04_marker_rank_abundance_qc/<dataset>/"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Summarizes QC biology/confounding evidence."
  enrichment:
    description: "Differential abundance interpretation: enrichment manifests, GO/GSEA comparisons, neuropil/reference annotations, targeted signatures, program summaries, external overlaps, and EWCE."
    scripts:
      - script: "04_differential_expression_enrichment/01_clusterProfiler.r"
        required: true
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "enrichment"
        scope: "dataset_specific"
        produces: ["data/processed/04_differential_expression_enrichment/clusterProfiler/<dataset>/clusterProfiler_manifest.csv"]
        consumes_required: ["data/processed/02_id_mapping/mapped/<dataset>/forward/per_file/*.csv"]
        consumes_optional: ["data/external/MOUSE_10090_idmapping.dat"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Creates the dataset-scoped clusterProfiler manifest consumed by compareGO and program summaries."
      - script: "04_differential_expression_enrichment/02_compareGO.r"
        required: true
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "enrichment"
        scope: "dataset_specific"
        produces: ["data/processed/04_differential_expression_enrichment/compareGO/<dataset>/compareGO_input_manifest.csv", "results/tables/04_differential_expression_enrichment/compareGO/<dataset>/"]
        consumes_required: ["data/processed/04_differential_expression_enrichment/clusterProfiler/<dataset>/clusterProfiler_manifest.csv"]
        consumes_optional: []
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Consumes only the manifest-selected clusterProfiler outputs for this dataset."
      - script: "04_differential_expression_enrichment/04_neuropil_reference_annotation.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "enrichment"
        scope: "dataset_specific"
        produces: ["results/tables/04_differential_expression_enrichment/neuropil_reference_annotation/<dataset>/"]
        consumes_required: ["data/processed/04_differential_expression_enrichment/clusterProfiler/<dataset>/clusterProfiler_manifest.csv", "data/processed/04_differential_expression_enrichment/clusterProfiler/neuron_neuropil/clusterProfiler_manifest.csv"]
        consumes_optional: ["config/marker_panels/wgcna_reference_marker_sets.csv"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Adds neuropil-reference annotation where supported; microglia uses this as context for ROI/local microenvironment interpretation, not subtraction."
      - script: "04_differential_expression_enrichment/05_microglia_targeted_signature_enrichment.r"
        required: false
        datasets: ["microglia"]
        stage: "enrichment"
        scope: "dataset_specific"
        produces: ["results/tables/04_differential_expression_enrichment/microglia_targeted_signature_enrichment/microglia/"]
        consumes_required: ["data/processed/04_differential_expression_enrichment/clusterProfiler/microglia/clusterProfiler_manifest.csv"]
        consumes_optional: ["config/marker_panels/wgcna_reference_marker_sets.csv", "results/tables/03_qc_exploration/05_empirical_roi_marker_discovery/empirical_roi_marker_sets.csv"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Microglia-only targeted signature enrichment; supports conservative ROI annotation rather than purified-cell claims."
      - script: "04_differential_expression_enrichment/03_biological_program_summary.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "enrichment"
        scope: "dataset_specific"
        produces: ["results/tables/04_differential_expression_enrichment/biological_program_summary/<dataset>/program_summary.csv"]
        consumes_required: ["data/processed/04_differential_expression_enrichment/clusterProfiler/<dataset>/clusterProfiler_manifest.csv", "data/processed/04_differential_expression_enrichment/compareGO/<dataset>/compareGO_input_manifest.csv"]
        consumes_optional: ["results/tables/04_differential_expression_enrichment/neuropil_reference_annotation/<dataset>/", "results/tables/04_differential_expression_enrichment/microglia_targeted_signature_enrichment/<dataset>/"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Runs after clusterProfiler and compareGO; summarizes conservative biological programs and uses annotations/signatures where supported."
      - script: "04_differential_expression_enrichment/06_compareGO_spatial_program_atlas.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "enrichment"
        scope: "dataset_specific"
        produces: ["results/tables/04_differential_expression_enrichment/compareGO_spatial_atlas/spatial_program_summary.csv", "results/tables/04_differential_expression_enrichment/compareGO_spatial_atlas/compareGO_spatial_program_atlas_tables.xlsx", "results/source_data/04_differential_expression_enrichment/compareGO_spatial_atlas/spatial_atlas_enrichment_long.csv"]
        consumes_required: ["data/processed/04_differential_expression_enrichment/compareGO/<dataset>/compareGO_input_manifest.csv"]
        consumes_optional: ["results/tables/04_differential_expression_enrichment/biological_program_summary/<dataset>/program_summary.csv"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Builds a spatial program atlas from compareGO outputs without changing enrichment statistics."
      - script: "04_differential_expression_enrichment/07_external_stress_disease_signature_overlap.r"
        required: false
        datasets: ["global"]
        stage: "enrichment"
        scope: "global"
        produces: ["results/tables/04_differential_expression_enrichment/external_stress_disease_signature_overlap/global/external_stress_disease_signature_overlap.csv", "results/source_data/04_differential_expression_enrichment/external_stress_disease_signature_overlap/global/external_stress_disease_signature_overlap.csv", "results/logs/04_differential_expression_enrichment/external_stress_disease_signature_overlap/global/run_manifest.yml"]
        consumes_required: []
        consumes_optional: ["data/external/stress_disease_signatures/*.csv", "results/tables/04_differential_expression_enrichment/biological_program_summary/neuron_neuropil/program_summary.csv", "results/tables/04_differential_expression_enrichment/biological_program_summary/neuron_soma/program_summary.csv", "results/tables/04_differential_expression_enrichment/biological_program_summary/microglia/program_summary.csv"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Offline-only overlap against cached stress/disease signatures; missing optional signatures become status rows."
      - script: "05_celltype_enrichment_EWCE/01_EWCE_E9.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "enrichment"
        scope: "dataset_specific"
        produces: ["results/tables/05_celltype_enrichment_EWCE/EWCE_E9/"]
        consumes_required: ["data/processed/04_differential_expression_enrichment/clusterProfiler/<dataset>/clusterProfiler_manifest.csv"]
        consumes_optional: ["data/processed/04_differential_expression_enrichment/compareGO/<dataset>/compareGO_input_manifest.csv"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "EWCE after differential/enrichment inputs are available; retained in enrichment because it is a cell-type interpretation layer."
  modules_wgcna:
    description: "WGCNA network/module construction only: build modules, eigengenes, module definitions, and supermodule clustering state."
    scripts:
      - script: "06_modules_WGCNA/01_WGCNA.r"
        required: true
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "modules_wgcna"
        scope: "dataset_specific"
        produces: ["results/tables/06_modules_WGCNA/01_WGCNA/<dataset>/modules/"]
        consumes_required: ["data/processed/02_id_mapping/mapped/<dataset>/forward/per_file/*.csv"]
        consumes_optional: ["data/metadata/*.xlsx", "config/marker_panels/wgcna_reference_marker_sets.csv"]
        recomputes_core_state: true
        safe_downstream_rerun: false
        notes: "Network/module construction. This is the only stage entry that recomputes core WGCNA state; downstream annotation/reporting should use modules_downstream."
  modules_downstream:
    description: "WGCNA downstream interpretation: curated overlap programs, module scoring, DE/GSEA overlap, group-effect modelling, biological annotation, interpretable summaries, and robustness/context layers."
    scripts:
      - script: "06_modules_WGCNA/01a_compare_GO_recurrent_proteins.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "modules_downstream"
        scope: "dataset_specific"
        produces: ["results/tables/04_differential_expression_enrichment/compareGO/<dataset>/recurrent_top_gene_drivers/overlapping_proteins_min3_spatial_units.xlsx"]
        consumes_required: ["results/tables/04_differential_expression_enrichment/compareGO/<dataset>/BP/phenotype_within_unit/07_Top_Genes_Driving_TopTerms.xlsx"]
        consumes_optional: []
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Dataset-specific recurrent GO/protein comparison across spatial units; does not alter WGCNA modules."
      - script: "06_modules_WGCNA/02_curated_overlap_programs.r"
        required: false
        datasets: ["global"]
        stage: "modules_downstream"
        scope: "global"
        produces: ["results/tables/06_modules_WGCNA/curated_overlap_programs/global/"]
        consumes_required: ["results/tables/04_differential_expression_enrichment/compareGO/overlapping_proteins_min3_datasets.xlsx"]
        consumes_optional: ["data/external/MOUSE_10090_idmapping.dat"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Curated overlap programs are global biological program sets and are distinct from WGCNA module construction."
      - script: "06_modules_WGCNA/03_score_module_activity.R"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "modules_downstream"
        scope: "dataset_specific"
        produces: ["results/tables/06_modules_WGCNA/module_score/<dataset>/"]
        consumes_required: ["results/tables/06_modules_WGCNA/01_WGCNA/<dataset>/modules/", "data/processed/02_id_mapping/mapped/<dataset>/forward/per_file/*.csv"]
        consumes_optional: ["data/processed/01_preprocessing/06_merged_metadata_module_score/<dataset>/sample_metadata_merged_clean_for_module_scores.xlsx"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Module scoring layer: scores existing module definitions against dataset matrices; does not rebuild WGCNA modules. Dataset fallback is overlap for neuron_neuropil and WGCNA for neuron_soma/microglia."
      - script: "06_modules_WGCNA/03_score_module_activity.R"
        required: false
        datasets: ["neuron_neuropil"]
        stage: "modules_downstream"
        scope: "dataset_specific"
        env:
          PROTEOMICS_MODULE_DEFINITION_SOURCE: "wgcna"
        produces: ["results/tables/06_modules_WGCNA/module_score/<dataset>/wgcna/"]
        consumes_required: ["results/tables/06_modules_WGCNA/01_WGCNA/<dataset>/modules/", "data/processed/02_id_mapping/mapped/<dataset>/forward/per_file/*.csv"]
        consumes_optional: ["data/processed/01_preprocessing/06_merged_metadata_module_score/<dataset>/sample_metadata_merged_clean_for_module_scores.xlsx"]
        recomputes_core_state: false
        safe_downstream_rerun: true
        notes: "Additional neuron_neuropil WGCNA-source module-score pass. Keeps the default curated-overlap score run and adds data-driven WGCNA module-score effect-size plots."
      - script: "06_modules_WGCNA/04_wgcna_de_gsea_overlap.r"
        required: false
        datasets: ["neuron_neuropil", "neuron_soma", "microglia"]
        stage: "modules_downstream"
        scope: "dataset_specific"
        produces: ["results/tables/06_modules_WGCNA/04_wgcna_de_gsea_overlap/<dataset>/"]
