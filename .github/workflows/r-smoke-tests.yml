name: R contract smoke tests

on:
  push:
  pull_request:

jobs:
  contract-smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Parse active R scripts
        shell: Rscript {0}
        run: |
          files <- list.files(pattern = "[.][Rr]$", recursive = TRUE, full.names = TRUE)
          active <- files[!grepl("^(./)?(90_testing|99_deprecated)/", files)]
          bad <- character()
          for (f in active) {
            ok <- tryCatch({ parse(f); TRUE }, error = function(e) {
              message(f, ": ", conditionMessage(e))
              FALSE
            })
            if (!ok) bad <- c(bad, f)
          }
          message("Parsed active scripts: ", length(active) - length(bad), " / ", length(active))
          if (length(bad)) quit(status = 1)

      - name: Contract smoke tests
        shell: bash
        run: |
          set -euo pipefail
          Rscript tests/smoke_test_file_contracts.R
          Rscript tests/smoke_test_dataset_resolution.R
          Rscript tests/smoke_test_manifests.R

      - name: Lightweight dry-run entrypoints
        shell: bash
        run: |
          set -euo pipefail
          Rscript run_dataset_pipeline.R --list-stages
          for dataset in neuron_neuropil neuron_soma microglia; do
            for stage in qc enrichment modules_wgcna modules_downstream; do
              Rscript run_dataset_pipeline.R --dataset "$dataset" --stage "$stage" --dry-run
            done
          done
